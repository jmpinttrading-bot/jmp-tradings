<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMP Administrative Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; display: flex; min-height: 100vh; }
        
        .sidebar { width: 280px; background-color: #0f172a; color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 15px; color: #ee964b; }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px; display: block; border-radius: 6px; margin-bottom: 8px; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background-color: #1e293b; color: white; border-left: 4px solid #ee964b; }
        .logout-btn { margin-top: auto; background-color: #d9534f; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .main-content { flex: 1; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-badge { background: #fef3c7; color: #b45309; padding: 6px 15px; border-radius: 20px; font-weight: 700; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card h3 { margin-bottom: 20px; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        
        .btn { background: #0b2545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background: #133a6f; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; }
        th { background-color: #f8fafc; color: #64748b; }
        
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 6px; font-size: 0.9rem; display: none; }
        .alert.success { background: #d1fae5; color: #065f46; }
        .alert.error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>JMP Admin HQ</h2>
        <a href="#" class="active">🛡️ Employee Management</a>
        <button class="logout-btn" onclick="handleLogout()">Logout Admin</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Root Administrator Console</h1>
            <div class="admin-badge" id="adminEmail">Admin System</div>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="grid">
            <div class="card">
                <h3>Register New System Account</h3>
                <form onsubmit="handleCreateEmployee(event)">
                    <div class="form-group">
                        <label>Account Username</label>
                        <input type="text" id="newUsername" required placeholder="e.g., jsmith2026">
                    </div>
                    <div class="form-group">
                        <label>Initial Secure Password</label>
                        <input type="password" id="newPassword" required placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>System Account Role</label>
                        <select id="newRole">
                            <option value="Employee">Standard Employee</option>
                            <option value="Admin">System Administrator</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Provision Account</button>
                </form>
            </div>

            <div class="card">
                <h3>Update Admin Credentials</h3>
                <form onsubmit="handleAdminUpdate(event)">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="adminNewPassword" required placeholder="Enter new secure password">
                    </div>
                    <button type="submit" class="btn" style="background:#ee964b; color:#0f172a;">Update Password</button>
                </form>
            </div>
        </div>

        <div class="card" style="width: 100%;">
            <h3>Active Registered Directory</h3>
            <table>
                <thead>
                    <tr>
                        <th>System Username</th>
                        <th>Assigned Access Role</th>
                        <th>Registration Date</th>
                    </tr>
                </thead>
                <tbody id="directoryTableBody">
                    <tr><td colspan="3">Fetching user directory logs...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ebicabxnzeexucggrmbo.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaWNhYnhuemVleHVjZ2dybWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjM4MjgsImV4cCI6MjA5NzI5OTgyOH0.VJaMTAtCe0CclxlyzMMa0R3J9Pv6hZhPQaQV-RxrFK8";         
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const CORPORATE_DOMAIN = "@jmp-corporate.local";

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert ${type}`;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        async function initAdmin() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user || user.user_metadata.role !== 'Admin') { window.location.href = "login.html"; return; }
            document.getElementById('adminEmail').textContent = `⚙️ Admin: ${user.email.split('@')[0]}`;
            fetchDirectory();
        }

        // Fetching profiles safely from public.profiles table
        async function fetchDirectory() {
            const { data, error } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
            if (error) return;
            const tbody = document.getElementById('directoryTableBody');
            tbody.innerHTML = '';
            data.forEach(profile => {
                const row = `<tr>
                    <td><strong>${profile.username}</strong></td>
                    <td>${profile.role}</td>
                    <td>${new Date(profile.created_at).toLocaleDateString()}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        // Admin functionality to create an Employee account safely
        async function handleCreateEmployee(e) {
            e.preventDefault();
            const username = document.getElementById('newUsername').value.trim().toLowerCase();
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;

            if (username.includes('@')) { showAlert("Usernames cannot contain symbols.", "error"); return; }

            const generatedEmail = username + CORPORATE_DOMAIN;

            // Register account to Supabase Auth Engine
            const { data, error } = await supabaseClient.auth.signUp({
                email: generatedEmail,
                password: password,
                options: { data: { role: role } }
            });

            if (error) {
                showAlert(error.message, "error");
            } else {
                showAlert(`Successfully provisioned account for ${username}!`, "success");
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                fetchDirectory();
            }
        }

        // Update logged in admin password directly
        async function handleAdminUpdate(e) {
            e.preventDefault();
            const newPassword = document.getElementById('adminNewPassword').value;

            const { data, error } = await supabaseClient.auth.updateUser({ password: newPassword });

            if (error) {
                showAlert(error.message, "error");
            } else {
                showAlert("Admin security token credential updated successfully!", "success");
                document.getElementById('adminNewPassword').value = '';
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = "login.html";
        }
        initAdmin();
    </script>
</body>
</html>
