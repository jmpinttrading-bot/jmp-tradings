<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Document Manager | JMP HQ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; min-height: 100vh; }
        
        /* Navbar */
        .navbar { position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background-color: #0f172a; color: white; z-index: 1000; }
        .nav-brand { font-weight: bold; font-size: 1.2rem; color: #ee964b; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #94a3b8; text-decoration: none; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: white; }
        .logout-btn { background-color: #d9534f; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .main-content { padding: 40px; }
        .header-panel { background: white; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        
        .panel-grid { display: grid; grid-template-columns: minmax(0, 1fr); gap: 30px; }
        .panel-card { background: white; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .panel-card h3 { color: #0f172a; margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }

        .engine-launch-box { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; border: 1px solid #cbd5e1; padding: 20px; border-radius: 6px; }
        .launch-btn { background: #ee964b; color: #0f172a; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; }
        
        .directory-controls { display: flex; gap: 10px; background: #f8fafc; padding: 12px; border-radius: 6px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .month-folder-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .folder-node { background: #f1f5f9; padding: 15px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: 600; }
        .folder-node.active { background: #0f172a; color: white; }
        
        .folder-workspace { display: none; background: white; border: 1px solid #cbd5e1; padding: 25px; border-radius: 8px; margin-top: 20px; }
        .folder-workspace.active { display: block; }

        .table-responsive-wrapper { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 6px; }
        .item-list-table { width: 100%; border-collapse: collapse; }
        .item-list-table th, .item-list-table td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; white-space: nowrap; }
        
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-badge.pending { background: #fef3c7; color: #b45309; }
        .status-badge.completed { background: #d1fae5; color: #065f46; }

        /* Modals & Alerts */
        .viewer-overlay, .system-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.7); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .system-alert-card { background: white; width: 100%; max-width: 440px; border-radius: 12px; overflow: hidden; }
        .system-alert-header { padding: 20px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .system-alert-actions { padding: 15px; background: #f8fafc; display: flex; justify-content: flex-end; }
        .alert-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .alert-btn-primary { background: #0f172a; color: white; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">JMP Admin HQ</div>
        <div class="nav-links">
            <a href="admin-dashboard.html">Profile</a>
            <a href="#" class="active">Import Files</a>
            <a href="inventory-management.html">Inventory</a>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </nav>

    <div class="main-content">
        <div class="header-panel">
            <h1>Shipment Importation Documentation Hub</h1>
        </div>

        <div class="panel-grid">
            <div class="panel-card">
                <h3>Document Upload Engine</h3>
                <div class="engine-launch-box">
                    <p>Process, search, and view complete compiled document groups.</p>
                    <a href="upload-engine.html" class="launch-btn">⚙️ Open Upload Engine</a>
                </div>
            </div>

            <div class="panel-card">
                <h3>Monthly Directories</h3>
                <div class="directory-controls">
                    <select id="directoryYearSelect" onchange="buildMonthlyFolders();"></select>
                    <button onclick="addNewYearFolder()">+ New Year</button>
                    <button onclick="downloadEntireYearDirectory()">📥 Download Package</button>
                </div>
                <div class="month-folder-grid" id="monthFolderContainer"></div>
            </div>

            <div class="folder-workspace" id="folderWorkspaceWrapper">
                <h3 id="workspaceTitleDisplay">📂 Workspace Directory</h3>
                <div class="table-responsive-wrapper">
                    <table class="item-list-table">
                        <thead>
                            <tr><th>SPSIC Ref</th><th>Date</th><th>Status</th><th>Action</th></tr>
                        </thead>
                        <tbody id="documentLogsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="viewer-overlay" id="documentViewerOverlay">
        <iframe id="viewerModuleIframe" style="width: 90%; height: 90vh; border: none; background: white;"></iframe>
    </div>

    <script>
        const SUPABASE_URL = "https://ebicabxnzeexucggrmbo.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaWNhYnhuemVleHVjZ2dybWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjM4MjgsImV4cCI6MjA5NzI5OTgyOH0.VJaMTAtCe0CclxlyzMMa0R3J9Pv6hZhPQaQV-RxrFK8";         
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let selectedFolderMonth = "";
        let availableYears = [2026, 2027];
        const monthsLabels = [{text: "Jan", value: "01"}, {text: "Feb", value: "02"}, {text: "Mar", value: "03"}, {text: "Apr", value: "04"}, {text: "May", value: "05"}, {text: "Jun", value: "06"}, {text: "Jul", value: "07"}, {text: "Aug", value: "08"}, {text: "Sep", value: "09"}, {text: "Oct", value: "10"}, {text: "Nov", value: "11"}, {text: "Dec", value: "12"}];

        // --- Core Initialization ---
        async function initModule() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            initYearSelectOptions(new Date().getFullYear());
            buildMonthlyFolders();
        }

        function initYearSelectOptions(defaultYear) {
            const select = document.getElementById('directoryYearSelect');
            availableYears.forEach(yr => {
                const opt = document.createElement('option');
                opt.value = yr; opt.textContent = yr;
                if (yr === defaultYear) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function buildMonthlyFolders() {
            const container = document.getElementById('monthFolderContainer');
            container.innerHTML = "";
            monthsLabels.forEach(m => {
                const div = document.createElement('div');
                div.className = 'folder-node';
                div.textContent = m.text;
                div.onclick = () => { 
                    selectedFolderMonth = `${document.getElementById('directoryYearSelect').value}-${m.value}`;
                    document.getElementById('folderWorkspaceWrapper').classList.add('active');
                    fetchDocuments(); 
                };
                container.appendChild(div);
            });
        }

        async function fetchDocuments() {
            const { data } = await supabaseClient.from('imported_shipment_docs').select('*').eq('target_month', selectedFolderMonth);
            const tbody = document.getElementById('documentLogsTableBody');
            tbody.innerHTML = data && data.length > 0 ? data.map(doc => `<tr>
                <td>${doc.spsic_number}</td>
                <td>${doc.created_at.split('T')[0]}</td>
                <td><span class="status-badge ${doc.status.toLowerCase()}">${doc.status}</span></td>
                <td><button onclick="openDocCompiler('${doc.id}')">Inspect</button></td>
            </tr>`).join('') : '<tr><td colspan="4">No records found.</td></tr>';
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = "login.html";
        }

        initModule();
    </script>
</body>
</html>
