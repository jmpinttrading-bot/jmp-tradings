<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Manifest Compiler Viewer Module</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #1e293b; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        .viewer-card { background: white; width: 100%; height: 100%; max-height: 85vh; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; transition: all 0.25s ease; }
        .viewer-card.zoomed-full { max-height: 98vh; border-radius: 0; }

        .viewer-header { background: #1e293b; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #334155; }
        .viewer-header-info h2 { font-size: 1.15rem; color: #ee964b; margin-bottom: 2px; }
        .viewer-header-info p { font-size: 0.8rem; color: #94a3b8; }

        .header-actions { display: flex; align-items: center; gap: 10px; }
        .header-btn { background: #334155; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.15s; }
        .header-btn:hover { background: #475569; }
        .header-btn.btn-approve { background: #16a34a; color: white; }
        .header-btn.btn-approve:hover { background: #15803d; }
        .header-btn.btn-close { background: #ef4444; color: white; }
        .header-btn.btn-close:hover { background: #dc2626; }

        .viewer-workspace { flex: 1; display: grid; grid-template-columns: 320px 1fr; overflow: hidden; background: #f8fafc; }

        .roster-panel { background: #ffffff; border-right: 1px solid #cbd5e1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .panel-section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; letter-spacing: 0.05em; margin-bottom: 4px; }
        
        .file-node-item { border: 1px solid #e2e8f0; background: #f8fafc; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 4px; }
        .file-node-item:hover { border-color: #cbd5e1; background: #f1f5f9; }
        .file-node-item.active { border-color: #ee964b; background: #fff7ed; }
        .file-node-item .file-title { font-size: 0.85rem; font-weight: 600; color: #0f172a; }
        .file-node-item .file-meta { font-size: 0.75rem; color: #64748b; }

        .preview-render-pane { background: #e2e8f0; display: flex; flex-direction: column; position: relative; }
        .preview-frame { width: 100%; height: 100%; border: none; background: #cbd5e1; }
        
        .placeholder-notice { margin: auto; text-align: center; color: #64748b; max-width: 320px; padding: 20px; }
        .placeholder-notice .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; opacity: 0.6; }
        .placeholder-notice h4 { color: #0f172a; margin-bottom: 6px; }
        .placeholder-notice p { font-size: 0.85rem; line-height: 1.4; }

        @media (max-width: 768px) {
            .viewer-workspace { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
            .roster-panel { border-right: none; border-bottom: 1px solid #cbd5e1; max-height: 200px; }
        }
    </style>
</head>
<body>

    <div class="viewer-card" id="interactiveViewerCard">
        <div class="viewer-header">
            <div class="viewer-header-info">
                <h2 id="viewManifestTitle">SPSIC Roster Configuration</h2>
                <p id="viewManifestMeta">Loading document telemetry matrix data...</p>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="modalToggleZoomBtn" onclick="toggleLocalFrameZoom()">🔲 Fullscreen</button>
                <button class="header-btn" id="modalDownloadActionBtn" onclick="triggerParentDownload()">📥 Download Document Package</button>
                <button class="header-btn btn-approve" id="modalApproveActionBtn" style="display: none;" onclick="triggerParentApproval()">✓ Approve Group</button>
                <button class="header-btn btn-close" onclick="triggerParentClose()">✕ Close</button>
            </div>
        </div>

        <div class="viewer-workspace">
            <div class="roster-panel">
                <div class="panel-section-title">Compiled Component Roster</div>
                <div id="compiledManifestItemsContainer" style="display: flex; flex-direction: column; gap: 10px;">
                    </div>
            </div>

            <div class="preview-render-pane" id="previewRenderPane">
                <div class="placeholder-notice" id="paneViewportPlaceholder">
                    <span class="icon">📄</span>
                    <h4>Interactive Render Port</h4>
                    <p>Select an isolated manifest sequence record from the roster side-panel layout interface to instantiate preview visualization streams.</p>
                </div>
                <iframe class="preview-frame" id="liveDocViewportIframe" style="display: none;"></iframe>
            </div>
        </div>
    </div>

    <script>
        let globalManifestRecord = null;
        let globalFilesArray = [];
        let isLocalFrameZoomed = false;

        /**
         * Core entry layout pipeline instantiated via parent management window
         */
        function setupViewerContent(docRecord, filesArray, isAdmin, bucketName, supabaseInstance) {
            globalManifestRecord = docRecord;
            globalFilesArray = filesArray;

            // Header Telemetry Parsing
            document.getElementById('viewManifestTitle').innerHTML = `Manifest Roster: <strong>SPSIC-${docRecord.spsic_number}</strong>`;
            document.getElementById('viewManifestMeta').textContent = `Target Directory Frame: ${docRecord.target_month} | State Loop: ${docRecord.status}`;

            // Admin Actions Validation Bypass
            const approveBtn = document.getElementById('modalApproveActionBtn');
            if (isAdmin && docRecord.status !== 'Completed') {
                approveBtn.style.display = 'flex';
            } else {
                approveBtn.style.display = 'none';
            }

            // Document Manifest Roster Build
            const container = document.getElementById('compiledManifestItemsContainer');
            container.innerHTML = "";

            if (!filesArray || filesArray.length === 0) {
                container.innerHTML = `<p style="font-size:0.85rem; color:#64748b; text-align:center; padding:10px;">No binary attachments bound.</p>`;
                return;
            }

            filesArray.forEach((file, index) => {
                const node = document.createElement('div');
                node.className = `file-node-item ${index === 0 ? 'active' : ''}`;
                node.onclick = () => selectActivePreviewFile(index, node);
                
                const timeLabel = file.uploadDate ? new Date(file.uploadDate).toLocaleDateString() : 'N/A';

                node.innerHTML = `
                    <div class="file-title">${file.name}</div>
                    <div class="file-meta">Timestamp: ${timeLabel}</div>
                `;
                container.appendChild(node);
            });

            // Initialize the default first item preview
            if (filesArray.length > 0) {
                renderLiveStreamView(filesArray[0].path);
            }
        }

        function selectActivePreviewFile(index, elementNode) {
            document.querySelectorAll('.file-node-item').forEach(el => el.classList.remove('active'));
            elementNode.classList.add('active');
            
            const targetFile = globalFilesArray[index];
            if (targetFile && targetFile.path) {
                renderLiveStreamView(targetFile.path);
            }
        }

        function renderLiveStreamView(urlPath) {
            const placeholder = document.getElementById('paneViewportPlaceholder');
            const iframe = document.getElementById('liveDocViewportIframe');

            if (!urlPath) {
                placeholder.style.display = 'block';
                iframe.style.display = 'none';
                return;
            }

            placeholder.style.display = 'none';
            iframe.style.display = 'block';
            
            // Native cloud viewer integration wrapper path for non-pdf architectures where necessary
            if (urlPath.includes('.doc') || urlPath.includes('.xls') || urlPath.includes('.xlsx')) {
                iframe.src = `https://view.officeapps.live.com/op/view.aspx?src=${encodeURIComponent(urlPath)}`;
            } else {
                iframe.src = urlPath;
            }
        }

        function toggleLocalFrameZoom() {
            const card = document.getElementById('interactiveViewerCard');
            const toggleBtn = document.getElementById('modalToggleZoomBtn');
            isLocalFrameZoomed = !isLocalFrameZoomed;

            if (isLocalFrameZoomed) {
                card.classList.add('zoomed-full');
                toggleBtn.textContent = "⧉ Default Window";
            } else {
                card.classList.remove('zoomed-full');
                toggleBtn.textContent = "🔲 Fullscreen";
            }

            if (window.parent && typeof window.parent.handleIframeZoomToggle === 'function') {
                window.parent.handleIframeZoomToggle(isLocalFrameZoomed);
            }
        }

        function triggerParentDownload() {
            if (window.parent && typeof window.parent.downloadCurrentDocumentPackage === 'function') {
                window.parent.downloadCurrentDocumentPackage();
            }
        }

        function triggerParentApproval() {
            if (window.parent && typeof window.parent.approveCurrentDocument === 'function') {
                window.parent.approveCurrentDocument();
            }
        }

        function triggerParentClose() {
            if (window.parent && typeof window.parent.closeViewer === 'function') {
                window.parent.closeViewer();
            }
        }
    </script>
</body>
</html>
