<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: transparent; padding: 0; overflow: hidden; }
        
        .viewer-card { background: white; width: 100%; height: 90vh; border-radius: 12px; padding: 25px; display: flex; flex-direction: column; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); position: relative; border: 1px solid #e2e8f0; }
        .viewer-card.zoomed-full { height: 100vh !important; border-radius: 0px !important; border: none; }
        
        .viewer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .viewer-body { flex: 1; background: #f1f5f9; border-radius: 6px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding: 15px; }
        .compiled-frame { width: 100%; height: 500px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 10px; background: white; transition: height 0.2s ease; }
        
        .office-fallback-container { background: white; border: 1px solid #cbd5e1; border-radius: 6px; padding: 30px; text-align: center; margin-bottom: 10px; }
        .viewer-footer { margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 10px; }
        
        .close-viewer-btn { background: #64748b; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .approve-action-btn { background: #22c55e; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: none; }
        .download-action-btn { background: #2563eb; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .download-action-btn:hover { background: #1d4ed8; }
        
        .doc-header-title { font-size: 1rem; color: #0f172a; margin: 15px 0 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .upload-date-span { font-size: 0.85rem; color: #64748b; font-weight: normal; background: #e2e8f0; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="viewer-card" id="interactiveViewerCard" ondblclick="toggleLocalZoomScale()">
        <div class="viewer-header">
            <h2 id="viewerTitleDisplay">Compiled View Panel</h2>
            <button onclick="toggleLocalZoomScale()" style="background: #0f172a; color: white; padding: 6px 12px; border: none; border-radius: 4px; font-weight: 600; font-size: 0.8rem; cursor: pointer;">🔎 Toggle Full Page Zoom</button>
        </div>
        <div class="viewer-body" id="viewerTargetBody"></div>
        <div class="viewer-footer">
            <button id="modalDownloadActionBtn" class="download-action-btn" onclick="window.parent.downloadCurrentDocumentPackage()">📥 Download Document Package</button>
            <button id="modalApproveActionBtn" class="approve-action-btn" onclick="window.parent.approveCurrentDocument()">Approve Documents</button>
            <button class="close-viewer-btn" onclick="window.parent.closeViewer()">Dismiss Viewer</button>
        </div>
    </div>

    <script>
        function toggleLocalZoomScale() {
            const card = document.getElementById('interactiveViewerCard');
            card.classList.toggle('zoomed-full');
            // Tells parent document window frame to toggle sizing limits alongside the iframe layout
            window.parent.handleIframeZoomToggle(card.classList.contains('zoomed-full'));
        }

        // Exposed function called by parent window to render UI states dynamically
        function setupViewerContent(doc, filesArray, isAdmin, STORAGE_BUCKET_NAME, parentSupabaseClient) {
            document.getElementById('viewerTitleDisplay').textContent = `Manifest Viewer: SPSIC-${doc.spsic_number}`;
            const targetBody = document.getElementById('viewerTargetBody');
            targetBody.innerHTML = "";

            filesArray.forEach(file => {
                const readableTimestamp = window.parent.formatHumanReadableDate(file.uploadDate);
                const { data } = parentSupabaseClient.storage.from(STORAGE_BUCKET_NAME).getPublicUrl(file.path);
                let publicUrl = data.publicUrl;

                const titleContainer = document.createElement('div');
                titleContainer.className = "doc-header-title";
                titleContainer.innerHTML = `<h4>${file.name}</h4> <span class="upload-date-span">Date Upload: ${readableTimestamp}</span>`;
                targetBody.appendChild(titleContainer);

                const lowerPath = file.path.toLowerCase();
                const isOfficeFile = lowerPath.endsWith('.doc') || lowerPath.endsWith('.docx') || lowerPath.endsWith('.xls') || lowerPath.endsWith('.xlsx');

                if (isOfficeFile) {
                    const officeBlock = document.createElement('div');
                    officeBlock.className = "office-fallback-container";
                    officeBlock.innerHTML = isAdmin ? 
                        `<p style="font-weight: 600; color: #1e293b;">📄 Word / Excel Document Asset</p><p style="font-size: 0.85rem; color: #64748b; margin-top: 4px;">Web browsers cannot preview custom spreadsheet files inline natively. Download the manifest package to review files locally.</p>` :
                        `<p style="font-weight: 600; color: #ef4444;">🛡️ Document Protected (Access Restricted)</p><p style="font-size: 0.85rem; color: #64748b; margin-top: 4px;">Local asset downloading rules are disabled for current Employee profile permission levels.</p>`;
                    targetBody.appendChild(officeBlock);
                } else {
                    const iframe = document.createElement('iframe');
                    iframe.className = "compiled-frame";
                    iframe.src = !isAdmin ? `${publicUrl}#toolbar=0&navpanes=0&scrollbar=0` : publicUrl;
                    targetBody.appendChild(iframe);
                }
            });

            const approveBtn = document.getElementById('modalApproveActionBtn');
            approveBtn.style.display = (isAdmin && doc.status === 'For Approval') ? "block" : "none";
        }
    </script>
</body>
</html>
