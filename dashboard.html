<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JMP Dashboard | Inventory View</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; }
        
        /* Navigation Styles - Exactly matched with employee-dashboard.html */
        .navbar { background-color: #1e293b; color: white; width: 100%; display: flex; flex-direction: column; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        .nav-title { font-size: 0.75rem; color: #f97316; font-weight: bold; text-transform: uppercase; }
        .logout-btn { background-color: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; padding-bottom: 5px; }
        .nav-btn { background-color: #334155; color: #cbd5e1; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; cursor: pointer; border: none; white-space: nowrap; }
        .nav-btn:hover { background-color: #475569; color: white; }
        .nav-btn.active { background: #475569; color: white; }

        /* Standardized Notification Modal Styles from inventory-management.html */
        .restriction-modal-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 37, 69, 0.6); display: flex; align-items: center; justify-content: center; z-index: 20000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .restriction-modal-container.is-visible { opacity: 1; pointer-events: auto; }
        .restriction-modal-card { background: white; border-radius: 12px; width: 90%; max-width: 440px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .restriction-modal-card h4 { margin-bottom: 10px; color: #1e293b; font-size: 1.25rem; }
        .restriction-modal-card p { color: #64748b; font-size: 0.9rem; margin-bottom: 5px; }
        .modal-btn { background: #0b2545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%; max-width: 150px; }

        /* Content Area Alignment */
        .main-content { padding: 40px; }
        
        .welcome-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
        .welcome-logo { width: 80px; height: 80px; object-fit: contain; }
        #welcomeMsg { font-size: 1.8rem; margin: 0; color: #1e293b; }
        
        .filter-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        .filter-section .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.75rem; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .filter-group input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; outline: none; }
        .filter-group input:focus { border-color: #3b82f6; }
        .generate-btn { background: #1e293b; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .generate-btn:hover { background: #0f172a; }

        .facility-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; white-space: nowrap; }
        .sub-header { font-size: 0.72rem; font-weight: bold; background: #f8fafc; color: #475569; text-transform: uppercase; }
        h2 { font-size: 1rem; margin-top: 0; padding: 10px; border-radius: 6px; color: white; }

        /* Storage Summary Metrics Layout */
        .facility-summary-card { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 12px 18px; margin-top: 15px; border-radius: 8px; display: inline-flex; flex-direction: column; gap: 4px; min-width: 240px; }
        .facility-summary-card span:first-child { font-size: 0.72rem; text-transform: uppercase; color: #64748b; font-weight: 700; letter-spacing: 0.5px; }
        .facility-summary-card span:last-child { font-size: 1.35rem; font-weight: 800; color: #1e293b; }
    </style>
</head>
<body>

    <div class="restriction-modal-container" id="accessBlockerModal">
        <div class="restriction-modal-card">
            <h4 id="restrictionModalTitle">Access Restricted</h4>
            <p id="restrictionModalMessage">You do not possess the structural authorization parameters required to enter this workspace zone.</p>
            <button class="modal-btn" onclick="closeRestrictionModal()">Acknowledge</button>
        </div>
    </div>

    <nav class="navbar">
        <div class="top-row">
            <div class="nav-title">JMP INTERNATIONAL FISH TRADING</div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-btn active" onclick="verifyNavigationPrivilege('profile_access', 'dashboard.html')">Dashboard</a>
            <a href="#" class="nav-btn" onclick="verifyNavigationPrivilege('employee_201_access', 'employee-dashboard.html')">My Profile</a>
            <a href="#" class="nav-btn" onclick="verifyNavigationPrivilege('import_access', 'import-docs.html')">Imports</a>
            <a href="#" class="nav-btn" onclick="verifyNavigationPrivilege('inventory_access', 'inventory-management.html')">Inventory</a>
            <a href="#" class="nav-btn" onclick="verifyNavigationPrivilege('sales_invoice_access', 'sales-invoice.html')">Sales</a>
            <a href="#" class="nav-btn" onclick="verifyNavigationPrivilege('audit_access', 'audit-report.html')">Audit Report</a>
            <a href="#" class="nav-btn" id="settingsNavBtn" onclick="verifyNavigationPrivilege('admin_access', 'admin-dashboard.html')">Settings</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="welcome-box">
            <img src="circle-logo.png" alt="JMP Logo" class="welcome-logo">
            <h1 id="welcomeMsg">Welcome back</h1>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label>From Date</label>
                <input type="date" id="dateFrom">
            </div>
            <div class="filter-group">
                <label>To Date</label>
                <input type="date" id="dateTo">
            </div>
            <button class="generate-btn" onclick="updateReport()">Generate Report</button>
        </div>
        
        <div id="reportContainer"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://ebicabxnzeexucggrmbo.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaWNhYnhuemVleHVjZ2dybWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjM4MjgsImV4cCI6MjA5NzI5OTgyOH0.VJaMTAtCe0CclxlyzMMa0R3J9Pv6hZhPQaQV-RxrFK8";         
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUserPermissions = null;
        let currentAdminId = null;
        let realTimePresenceChannel = null;

        const facilityThemes = {
            "VVS COLD STORAGE & PROCESSING PLANT CORP.": "#0f172a",
            "HIGHTOWER STORAGE & TRADING CENTRE, INC.": "#15803d",
            "EISBERG COLD LOGISTICS INC.": "#0369a1",
            "POLARIS COLD CHAIN SOLUTIONS": "#a16207"
        };

        function toLocalDateString(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function verifyNavigationPrivilege(accessKey, url) {
            if (!currentUserPermissions) return;

            const roleClean = String(currentUserPermissions.role || '').toLowerCase().trim();
            if (roleClean === 'admin') {
                window.location.href = url;
                return;
            }

            if (accessKey === 'admin_access') {
                document.getElementById('restrictionModalTitle').textContent = "Access Restricted";
                document.getElementById('restrictionModalMessage').textContent = "Administrative level privileges are required to access System Settings.";
                document.getElementById('accessBlockerModal').classList.add('is-visible');
                return;
            }

            if (accessKey === 'audit_access') {
                window.location.href = url;
                return;
            }

            let val = currentUserPermissions[accessKey];
            if (accessKey === 'employee_201_access' && (val === undefined || val === null || val === false)) {
                val = currentUserPermissions['profile_access'];
            }

            const cleanedValStr = String(val || '').replace(/['"]+/g, '').toLowerCase().trim();
            const isRestricted = (val === false || cleanedValStr === 'false' || !val);

            if (isRestricted) {
                document.getElementById('restrictionModalTitle').textContent = "Access Restricted";
                document.getElementById('restrictionModalMessage').textContent = "You do not possess the dynamic authorization privileges needed for this module pipeline.";
                document.getElementById('accessBlockerModal').classList.add('is-visible');
            } else {
                window.location.href = url;
            }
        }

        function closeRestrictionModal() {
            document.getElementById('accessBlockerModal').classList.remove('is-visible');
        }

        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            currentAdminId = user.id;
            
            const { data: profile, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .maybeSingle();

            if (error || !profile) {
                console.error("Profile structural query fault:", error);
                window.location.href = "login.html";
                return;
            }

            currentUserPermissions = profile;
            const roleClean = String(currentUserPermissions.role || '').toLowerCase().trim();

            const settingsBtn = document.getElementById('settingsNavBtn');
            if (roleClean === 'admin' && settingsBtn) {
                settingsBtn.style.background = "#475569";
                settingsBtn.style.color = "white";
            }

            const { data: docData } = await supabaseClient
                .from('employee_201_docs')
                .select('given_name')
                .eq('id', user.id)
                .maybeSingle();

            if (docData && docData.given_name && docData.given_name.trim() !== "") {
                document.getElementById('welcomeMsg').textContent = `Welcome back, ${docData.given_name.trim()}!`;
            } else {
                document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.email.split('@')[0]}!`;
            }

            // Fire and initialize the session presence beacon for this dashboard view
            initializePresenceSynchronization(user, profile.username, profile.role);

            const now = new Date();
            const y = now.getFullYear();
            const m = now.getMonth();
            const d = now.getDate();

            const dateToday = new Date(y, m, d + 1);
            const dateLastWeek = new Date(y, m, d + 1 - 6);
            
            document.getElementById('dateFrom').value = toLocalDateString(dateLastWeek);
            document.getElementById('dateTo').value = toLocalDateString(dateToday);
            
            updateReport();
        }

        function initializePresenceSynchronization(u, name, role) {
            realTimePresenceChannel = supabaseClient.channel('jmp-global-presence', { 
                config: { presence: { key: u.id } } 
            });

            realTimePresenceChannel.subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await realTimePresenceChannel.track({
                        username: name,
                        role: role,
                        online_at: new Date().toISOString()
                    });
                }
            });
        }

        async function updateReport() {
            const start = document.getElementById('dateFrom').value;
            const end = document.getElementById('dateTo').value;
            const container = document.getElementById('reportContainer');
            
            const { data, error } = await supabaseClient
                .from('transactions')
                .select('id, item_code, total_pallet, date, balance, storage_facility, sales_order_no')
                .lte('date', end)
                .order('date', { ascending: true });

            if (error) { container.innerHTML = 'Error loading data: ' + error.message; return; }

            container.innerHTML = '';
            Object.keys(facilityThemes).forEach(f => renderFacility(f, data || [], start, end));
        }

        function renderFacility(name, allData, start, end) {
            const color = facilityThemes[name] || "#475569";
            const facilityData = allData.filter(d => d.storage_facility && d.storage_facility.trim() === name.trim());
            
            const itemsAtFacility = [...new Set(facilityData.map(d => d.item_code))].filter(Boolean);
            
            const parseDate = (dStr) => {
                const [y, m, d] = dStr.split('-');
                return [parseInt(y), parseInt(m) - 1, parseInt(d)];
            };

            let dates = [];
            let [currY, currM, currD] = parseDate(start);
            let [endY, endM, endD] = parseDate(end);
            
            let current = new Date(currY, currM, currD);
            let target = new Date(endY, endM, endD);
            
            while (current <= target) {
                dates.push(current.toISOString().split('T')[0]);
                current.setDate(current.getDate() + 1);
            }

            dates.reverse();

            let html = `<div class="facility-container">
                <h2 style="background-color: ${color};">${name}</h2>
                <table>
                    <thead>
                        <tr>
                            <th rowspan="2" style="background-color: ${color}; color: white; vertical-align: middle;">Item Code</th>`;
            
            dates.forEach(d => {
                const [y, m, day] = d.split('-');
                const formatted = new Date(y, m-1, day).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                html += `<th colspan="2" style="background-color: ${color}; color: white;">${formatted}</th>`;
            });
            
            html += `</tr><tr>`;
            dates.forEach(() => {
                html += `<th class="sub-header">Bal</th><th class="sub-header">Pallet</th>`;
            });
            html += `</tr></thead><tbody>`;

            let columnTotals = new Array(dates.length).fill(0);

            itemsAtFacility.forEach(code => {
                html += `<tr>
                            <td style="font-weight: 700;">${code}</td>`;
                
                dates.forEach((date, index) => {
                    const match = facilityData.filter(d => d.item_code === code && d.date <= date)
                                              .sort((a, b) => {
                                                  const dateCompare = b.date.localeCompare(a.date);
                                                  if (dateCompare !== 0) return dateCompare;
                                                  
                                                  const soA = a.sales_order_no ? String(a.sales_order_no) : '';
                                                  const soB = b.sales_order_no ? String(b.sales_order_no) : '';
                                                  const soCompare = soB.localeCompare(soA);
                                                  if (soCompare !== 0) return soCompare;

                                                  return b.id - a.id;
                                              })[0];
                    
                    const balance = match ? parseInt(match.balance) || 0 : 0;
                    const pallets = (match && match.total_pallet) ? match.total_pallet : '—';
                    
                    columnTotals[index] += balance;
                    
                    html += `<td>${balance.toLocaleString()}</td>
                             <td style="color: #64748b; font-weight: 600;">${pallets}</td>`;
                });
                html += `</tr>`;
            });

            html += `</tbody></table>`;

            const currentLiveFacilityTotal = columnTotals[0] || 0;

            html += `
                <div class="facility-summary-card">
                    <span>Active Stock Volume (${dates[0] || 'Latest'})</span>
                    <span>${currentLiveFacilityTotal.toLocaleString()} Units Total</span>
                </div>
            </div>`;

            document.getElementById('reportContainer').insertAdjacentHTML('beforeend', html);
        }

        function setupSessionCrossCheckListener() {
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_OUT' || !session) {
                    window.location.href = "login.html";
                }
            });
        }

        async function handleLogout() {
            if (realTimePresenceChannel) {
                await realTimePresenceChannel.untrack();
            }
            await supabaseClient.auth.signOut();
            window.location.href = "login.html";
        }

        initDashboard();
    </script>
</body>
</html>
