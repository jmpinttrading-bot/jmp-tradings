<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JMP Dashboard | Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .navbar { background-color: #1e293b; color: white; width: 100%; display: flex; flex-direction: column; padding: 10px; gap: 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        .nav-title { font-size: 0.75rem; color: #f97316; font-weight: bold; text-transform: uppercase; line-height: 1.2; flex: 1; }
        .logout-btn { background-color: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; flex-shrink: 0; cursor: pointer; }
        .nav-links { display: flex; gap: 8px; overflow-x: auto; width: 100%; padding-bottom: 5px; }
        .nav-btn { background-color: #334155; color: #cbd5e1; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; white-space: nowrap; border: none; cursor: pointer; }
        .nav-btn:hover { background-color: #475569; color: white; }
        .nav-btn.active { background: #475569; color: white; }

        /* Modal Styles */
        .restriction-modal-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 37, 69, 0.6); display: flex; align-items: center; justify-content: center; z-index: 20000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .restriction-modal-container.is-visible { opacity: 1; pointer-events: auto; }
        .restriction-modal-card { background: white; border-radius: 12px; width: 90%; max-width: 440px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-btn { background: #0b2545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%; max-width: 150px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="top-row">
            <div class="nav-title">JMP INTERNATIONAL FISH TRADING</div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-btn active">Dashboard</a>
            <a href="employee-dashboard.html" class="nav-btn">My Profile</a>
            <a href="import-docs.html" class="nav-btn">Imports</a>
            <a href="inventory.html" class="nav-btn">Inventory</a>
            <a href="sales.html" class="nav-btn">Sales</a>
            <a href="admin-dashboard.html" class="nav-btn" onclick="checkAccess(event)">Settings</a>
        </div>
    </nav>

    <div style="padding: 20px;">
        <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <h1 id="welcomeMsg" style="font-size: 1.2rem;">Welcome</h1>
            <p style="font-size: 0.9rem; color: #64748b;">System operational.</p>
        </div>
    </div>

    <!-- Notification Modal -->
    <div class="restriction-modal-container" id="accessBlockerModal">
        <div class="restriction-modal-card">
            <h4 id="alertTitle">Notification</h4>
            <p id="alertMessage">Execution status telemetry readout frame.</p>
            <button class="modal-btn" onclick="closeRestrictionModal()">Acknowledge</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ebicabxnzeexucggrmbo.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaWNhYnhuemVleHVjZ2dybWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjM4MjgsImV4cCI6MjA5NzI5OTgyOH0.VJaMTAtCe0CclxlyzMMa0R3J9Pv6hZhPQaQV-RxrFK8";         
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUserRole = "employee";

        async function initDashboard() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            
            // Fetch role to determine access level
            const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single();
            if (profile) currentUserRole = profile.role.toLowerCase().trim();
            
            document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.email.split('@')[0]}!`;
        }

        function checkAccess(event) {
            if (currentUserRole !== 'admin') {
                event.preventDefault();
                showSystemModal({ title: 'Access Restricted', message: 'Administrative privileges are required to access the System Settings.' });
            }
        }

        function showSystemModal(options = {}) {
            document.getElementById('alertTitle').textContent = options.title || 'Notification';
            document.getElementById('alertMessage').textContent = options.message || '';
            document.getElementById('accessBlockerModal').classList.add('is-visible');
        }

        function closeRestrictionModal() {
            document.getElementById('accessBlockerModal').classList.remove('is-visible');
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        }

        initDashboard();
    </script>
</body>
</html>
