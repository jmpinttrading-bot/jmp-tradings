<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JMP Dashboard | Inventory View</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .navbar { background-color: #1e293b; color: white; width: 100%; display: flex; flex-direction: column; padding: 10px; gap: 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        .nav-title { font-size: 0.75rem; color: #f97316; font-weight: bold; text-transform: uppercase; line-height: 1.2; flex: 1; }
        .logout-btn { background-color: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .nav-links { display: flex; gap: 8px; overflow-x: auto; width: 100%; padding-bottom: 5px; }
        .nav-btn { background-color: #334155; color: #cbd5e1; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; white-space: nowrap; border: none; cursor: pointer; }
        .nav-btn.active { background: #475569; color: white; }

        .main-content { padding: 20px; }
        .welcome-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .filter-section { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .facility-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; }
        h2 { font-size: 1rem; margin-top: 0; padding: 10px; border-radius: 6px; color: white; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="top-row">
            <div class="nav-title">JMP INTERNATIONAL FISH TRADING</div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-btn active">Dashboard</a>
            <a href="employee-dashboard.html" class="nav-btn">My Profile</a>
            <a href="import-docs.html" class="nav-btn">Imports</a>
            <a href="inventory.html" class="nav-btn">Inventory</a>
            <a href="sales.html" class="nav-btn">Sales</a>
            <a href="admin-dashboard.html" class="nav-btn">Settings</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="welcome-box">
            <h1 id="welcomeMsg" style="font-size: 1.2rem;">Welcome</h1>
        </div>

        <div class="filter-section">
            <label>From: <input type="date" id="dateFrom"></label>
            <label>To: <input type="date" id="dateTo"></label>
            <button onclick="updateReport()">Generate Report</button>
        </div>
        
        <div id="reportContainer"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://ebicabxnzeexucggrmbo.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaWNhYnhuemVleHVjZ2dybWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjM4MjgsImV4cCI6MjA5NzI5OTgyOH0.VJaMTAtCe0CclxlyzMMa0R3J9Pv6hZhPQaQV-RxrFK8";         
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const facilityThemes = {
            "VVS COLD STORAGE & PROCESSING PLANT CORP.": "#0f172a",
            "HIGHTOWER STORAGE & TRADING CENTRE, INC.": "#15803d",
            "EISBERG COLD LOGISTICS INC.": "#0369a1",
            "CRYSTAL COLD STORAGE, INC.": "#a16207"
        };

        // Utility to format Date object to YYYY-MM-DD local string
        function toLocalDateString(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.email.split('@')[0]}!`;

            const today = new Date(); // July 2, 2026
            const lastWeek = new Date();
            lastWeek.setDate(today.getDate() - 6);
            
            document.getElementById('dateFrom').value = toLocalDateString(lastWeek);
            document.getElementById('dateTo').value = toLocalDateString(today);
            
            updateReport();
        }

        async function updateReport() {
            const start = document.getElementById('dateFrom').value;
            const end = document.getElementById('dateTo').value;
            const container = document.getElementById('reportContainer');
            
            // We fetch up to the selected 'end' date.
            const { data, error } = await supabaseClient
                .from('transactions')
                .select('item_code, date, balance, storage_facility')
                .lte('date', end)
                .order('date', { ascending: true });

            if (error) { container.innerHTML = 'Error loading data.'; return; }

            container.innerHTML = '';
            Object.keys(facilityThemes).forEach(f => renderFacility(f, data || [], start, end));
        }

        function renderFacility(name, allData, start, end) {
            const color = facilityThemes[name] || "#475569";
            const facilityData = allData.filter(d => d.storage_facility && d.storage_facility.trim() === name.trim());
            const itemsAtFacility = [...new Set(facilityData.map(d => d.item_code))].filter(Boolean);
            
            let dates = [];
            // Parse start/end as local dates to avoid timezone shifting
            let curr = new Date(start + 'T00:00:00');
            let endDate = new Date(end + 'T00:00:00');
            
            while (curr <= endDate) {
                dates.push(curr.toISOString().split('T')[0]);
                curr.setDate(curr.getDate() + 1);
            }

            let html = `<div class="facility-container">
                <h2 style="background-color: ${color};">${name}</h2>
                <table><tr><th style="background-color: ${color}; color: white;">Item Code</th>`;
            
            dates.forEach(d => {
                const [y, m, day] = d.split('-');
                const formatted = new Date(y, m-1, day).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                html += `<th style="background-color: ${color}; color: white;">${formatted}</th>`;
            });
            html += `</tr>`;

            itemsAtFacility.forEach(code => {
                html += `<tr><td>${code}</td>`;
                let lastBalance = 0;
                const past = facilityData.filter(d => d.item_code === code && d.date < start);
                if (past.length > 0) lastBalance = past[past.length - 1].balance;

                dates.forEach(date => {
                    const match = facilityData.find(d => d.item_code === code && d.date === date);
                    if (match) lastBalance = match.balance;
                    html += `<td>${lastBalance}</td>`;
                });
                html += `</tr>`;
            });
            html += `</table></div>`;
            document.getElementById('reportContainer').insertAdjacentHTML('beforeend', html);
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = "login.html";
        }

        initDashboard();
    </script>
</body>
</html>
