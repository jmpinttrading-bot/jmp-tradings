<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPSIC Total Balance - JMP System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; min-height: 100vh; }
        
        .navbar { background-color: #1e293b; color: white; width: 100%; display: flex; flex-direction: column; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        .nav-title { font-size: 0.75rem; color: #f97316; font-weight: bold; text-transform: uppercase; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; padding-bottom: 5px; }
        .nav-btn { background-color: #334155; color: #cbd5e1; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .nav-btn:hover, .nav-btn.active { background-color: #475569; color: white; }

        .main-content { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; background-color: #ffffff; color: #475569; text-decoration: none; font-weight: 700; font-size: 0.9rem; margin-bottom: 25px; padding: 10px 18px; border-radius: 8px; border: 1px solid #cbd5e1; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .back-link:hover { color: #f97316; border-color: #f97316; }

        .card-panel { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 6px; font-weight: 700; font-size: 0.8rem; color: #475569; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; color: #1e293b; background: white; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #f97316; }

        .btn-primary { background: #0b2545; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.95rem; width: 100%; transition: background 0.2s; text-align: center; }
        .btn-primary:hover { background: #11355e; }

        .table-responsive { overflow-x: auto; background: white; border: 1px solid #e2e8f0; border-radius: 12px; width: 100%; }
        .master-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        .master-table th { background: #f8fafc; color: #475569; font-weight: 700; padding: 14px 16px; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; font-size: 0.75rem; white-space: nowrap; }
        .master-table td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; color: #334155; white-space: nowrap; }

        /* Pagination Styling */
        .pagination-container { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 10px; }
        .pagination-info { font-size: 0.85rem; color: #64748b; }
        .pagination-buttons { display: flex; gap: 10px; }
        .btn-pagination { background-color: #ffffff; color: #334155; border: 1px solid #cbd5e1; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-pagination:hover:not(:disabled) { border-color: #f97316; color: #f97316; }
        .btn-pagination:disabled { opacity: 0.5; cursor: not-allowed; background-color: #f1f5f9; }

        @media (max-width: 992px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="top-row">
            <div class="nav-title">JMP INTERNATIONAL FISH TRADING</div>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-btn">Dashboard</a>
            <a href="import-docs.html" class="nav-btn">Imports</a>
            <a href="inventory-management.html" class="nav-btn">Inventory</a>
            <a href="item-price.html" class="nav-btn">Item Pricing</a>
            <a href="dispo.html" class="nav-btn active">SPSIC Total Balance</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="header">
            <h1>SPSIC Balance Setup</h1>
        </div>

        <a href="item-price.html" class="back-link">⬅️ Back to Price Ledger</a>

        <!-- Balance Upload Form -->
        <div class="card-panel">
            <form id="dispoBalanceForm" onsubmit="handleFormSubmission(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>SPSIC Number</label>
                        <select id="spsic_dropdown" required onchange="handleSpsicSelectionChange()">
                            <option value="">-- Loading Active SPSIC Numbers --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Item Price (PHP)</label>
                        <input type="number" id="item_price" step="0.01" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Total Quantity Balance</label>
                        <input type="number" id="total_qty_bal" step="any" required placeholder="0.00">
                    </div>
                </div>
                <button type="submit" class="btn-primary">Update Balance Data</button>
            </form>
        </div>

        <!-- Ledger View from imported_shipment_docs -->
        <div class="card-panel">
            <h3 style="margin-bottom: 15px;">SPSIC Master Shipment Balances</h3>
            <div class="table-responsive">
                <table class="master-table">
                    <thead>
                        <tr>
                            <th>Storage Arrival Date</th>
                            <th>SPSIC Number</th>
                            <th>Commodity</th>
                            <th>Item Price</th>
                            <th>Total Qty Balance</th>
                        </tr>
                    </thead>
                    <tbody id="dispoHistoryBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #94a3b8; padding: 20px;">Loading shipment logs...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Table Pagination UI -->
            <div class="pagination-container">
                <div class="pagination-info" id="paginationInfo">Showing 0 to 0 of 0 logs</div>
                <div class="pagination-buttons">
                    <button class="btn-pagination" id="btnPrev" onclick="changePage(-1)" disabled>Previous</button>
                    <button class="btn-pagination" id="btnNext" onclick="changePage(1)" disabled>Next</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ebicabxnzeexucggrmbo.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaWNhYnhuemVleHVjZ2dybWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjM4MjgsImV4cCI6MjA5NzI5OTgyOH0.VJaMTAtCe0CclxlyzMMa0R3J9Pv6hZhPQaQV-RxrFK8";         
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let shipmentsCache = [];
        let currentPage = 1;
        const rowsPerPage = 20;

        async function initializePage() {
            await fetchShipmentData();
        }

        // Pulls records from imported_shipment_docs sorted by arrival date
        async function fetchShipmentData() {
            const dropdown = document.getElementById('spsic_dropdown');
            const tbody = document.getElementById('dispoHistoryBody');
            
            const { data, error } = await supabaseClient
                .from('imported_shipment_docs')
                .select('spsic_number, total_qty_bal, item_price, storage_arrival_date, commodity')
                .order('storage_arrival_date', { ascending: false }); // Newest logs first

            if (error) {
                alert("Failed to pull shipment information: " + error.message);
                return;
            }

            shipmentsCache = data || [];

            // 1. Populate Dropdown with Unique Values
            const uniqueSpsic = [...new Set(shipmentsCache.map(item => item.spsic_number).filter(Boolean))];

            if (uniqueSpsic.length === 0) {
                dropdown.innerHTML = '<option value="">No active SPSIC matches found</option>';
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #94a3b8; padding: 20px;">No shipment docs found.</td></tr>`;
                return;
            }

            dropdown.innerHTML = '<option value="">-- Choose SPSIC Document Target --</option>' + 
                uniqueSpsic.map(s => `<option value="${s}">${s}</option>`).join('');

            // 2. Render Balances Table with pagination setup
            currentPage = 1;
            renderPaginationTable();
        }

        function renderPaginationTable() {
            const tbody = document.getElementById('dispoHistoryBody');
            
            const totalItems = shipmentsCache.length;
            const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;

            // Page bounds validation
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = Math.min(startIndex + rowsPerPage, totalItems);
            const paginatedItems = shipmentsCache.slice(startIndex, endIndex);

            if (paginatedItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #94a3b8; padding: 20px;">No data configuration verified.</td></tr>`;
                document.getElementById('paginationInfo').innerText = "Showing 0 to 0 of 0 logs";
                document.getElementById('btnPrev').disabled = true;
                document.getElementById('btnNext').disabled = true;
                return;
            }

            tbody.innerHTML = paginatedItems.map(row => {
                const displayBal = row.total_qty_bal !== null && row.total_qty_bal !== undefined
                    ? parseFloat(row.total_qty_bal).toLocaleString(undefined, { minimumFractionDigits: 2 })
                    : '<span style="color:#94a3b8; font-style:italic;">Not Configured</span>';

                const displayPrice = row.item_price !== null && row.item_price !== undefined
                    ? '₱' + parseFloat(row.item_price).toLocaleString(undefined, { minimumFractionDigits: 2 })
                    : '<span style="color:#94a3b8; font-style:italic;">Not Configured</span>';

                // Cleans raw commodity text string by filtering out matching structural tag variants
                const rawCommodity = row.commodity || '';
                const cleanCommodity = rawCommodity.replace(/-[123]CV/g, '').trim();

                const arrivalDate = row.storage_arrival_date ? row.storage_arrival_date : 'N/A';

                return `
                    <tr>
                        <td>${arrivalDate}</td>
                        <td style="font-weight:700;">${row.spsic_number || 'N/A'}</td>
                        <td>${cleanCommodity || 'N/A'}</td>
                        <td style="font-weight:600; color:#0f172a;">${displayPrice}</td>
                        <td style="font-weight:600; color:#2563eb;">${displayBal}</td>
                    </tr>
                `;
            }).join('');

            // UI Label updates
            document.getElementById('paginationInfo').innerText = `Showing ${startIndex + 1} to ${endIndex} of ${totalItems} logs`;
            document.getElementById('btnPrev').disabled = currentPage === 1;
            document.getElementById('btnNext').disabled = currentPage === totalPages;
        }

        function changePage(direction) {
            currentPage += direction;
            renderPaginationTable();
        }

        // Automatically displays the existing quantity and item price when an SPSIC is selected
        function handleSpsicSelectionChange() {
            const selectedSpsic = document.getElementById('spsic_dropdown').value;
            const targetQtyInput = document.getElementById('total_qty_bal');
            const targetPriceInput = document.getElementById('item_price');
            
            if (!selectedSpsic) {
                targetQtyInput.value = '';
                targetPriceInput.value = '';
                return;
            }

            const matchedRecord = shipmentsCache.find(item => item.spsic_number === selectedSpsic);
            if (matchedRecord) {
                targetQtyInput.value = matchedRecord.total_qty_bal !== null ? matchedRecord.total_qty_bal : '';
                targetPriceInput.value = matchedRecord.item_price !== null ? matchedRecord.item_price : '';
            } else {
                targetQtyInput.value = '';
                targetPriceInput.value = '';
            }
        }

        // Form submission handling logic using an UPDATE query targeting balance and price columns
        async function handleFormSubmission(e) {
            e.preventDefault();
            
            const spsicNum = document.getElementById('spsic_dropdown').value;
            const qtyBal = parseFloat(document.getElementById('total_qty_bal').value);
            const priceVal = parseFloat(document.getElementById('item_price').value);

            if (!spsicNum) {
                alert("Please select a valid target SPSIC document string");
                return;
            }

            // Updates the columns inside imported_shipment_docs directly
            const { error } = await supabaseClient
                .from('imported_shipment_docs')
                .update({ 
                    total_qty_bal: qtyBal,
                    item_price: priceVal 
                })
                .eq('spsic_number', spsicNum);

            if (error) {
                alert("Database update failure executed: " + error.message);
                return;
            }

            alert("SPSIC balance records updated successfully!");
            document.getElementById('dispoBalanceForm').reset();
            await fetchShipmentData();
        }

        initializePage();
    </script>
</body>
</html>
