<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Router</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <p style="font-family: 'Segoe UI', sans-serif; text-align: center; margin-top: 50px; color: #334155;">
        Verifying access privileges... Please wait.
    </p>
    
    <script>
        const SUPABASE_URL = "https://ebicabxnzeexucggrmbo.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaWNhYnhuemVleHVjZ2dybWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjM4MjgsImV4cCI6MjA5NzI5OTgyOH0.VJaMTAtCe0CclxlyzMMa0R3J9Pv6hZhPQaQV-RxrFK8";
        
        // FIX: Changed variable name to supabaseClient to prevent global collision
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function routeUser() {
            // FIX: Using supabaseClient instance name here
            const { data: { user }, error } = await supabaseClient.auth.getUser();

            if (error || !user) {
                // Not logged in, kick back to login page
                window.location.href = "login.html";
                return;
            }

            // Read the user_role safely from Supabase User Metadata
            const userRole = user.user_metadata ? user.user_metadata.role : null;

            if (userRole === "Admin") {
                window.location.href = "admin-dashboard.html";
            } else {
                window.location.href = "employee-dashboard.html";
            }
        }
        routeUser();
    </script>
</body>
</html>
