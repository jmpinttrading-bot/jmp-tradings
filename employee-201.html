<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee 201 Personal Files | Admin Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; display: flex; min-height: 100vh; position: relative; }
        
        .sidebar { width: 280px; background-color: #0f172a; color: white; padding: 30px 20px; display: flex; flex-direction: column; shrink: 0; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 15px; color: #ee964b; }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px; display: block; border-radius: 6px; margin-bottom: 8px; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background-color: #1e293b; color: white; border-left: 4px solid #ee964b; }
        .logout-btn { margin-top: auto; background-color: #d9534f; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .main-content { flex: 1; padding: 40px; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .search-container { background: white; padding: 25px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .search-box { width: 100%; max-width: 400px; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 6px; }
        
        .file-grid { display: grid; gap: 20px; }
        .record-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .modal-card { background: white; width: 100%; max-width: 750px; max-height: 90vh; border-radius: 12px; padding: 35px; border-top: 6px solid #ee964b; display: flex; flex-direction: column; overflow-y: auto; }
        .modal-body { overflow-y: auto; padding-right: 10px; }
        .section-title { font-size: 0.9rem; font-weight: bold; color: #ee964b; text-transform: uppercase; margin: 15px 0 10px 0; border-bottom: 1px solid #f1f5f9; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 12px; }
        .form-group label { font-size: 0.8rem; font-weight: 700; color: #475569; display: block; margin-bottom: 4px; }
        .form-group input { padding: 9px 12px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid #e2e8f0; padding-top: 15px; margin-top: 20px; }
        .btn-save { background: #ee964b; color: #0f172a; border: none; padding: 10px 22px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>JMP Admin HQ</h2>
        <a href="admin-dashboard.html">Profile Management</a>
        <a href="#" class="active">📋 Employee 201 File</a>
        <button class="logout-btn" onclick="handleLogout()">Logout Admin</button>
    </div>

    <div class="main-content">
        <div class="header-panel">
            <h1>Corporate 201 File Management</h1>
        </div>

        <div class="search-container">
            <input type="text" id="searchBar" class="search-box" placeholder="Filter by username..." oninput="filterRecords()">
        </div>

        <div class="file-grid" id="recordsContainer"></div>
    </div>

    <div class="modal-overlay" id="dossierModal">
        <div class="modal-card">
            <h2 id="modalEmployeeTitle">Employee Folder</h2>
            <form id="dossierForm" onsubmit="saveGovernmentDocs(event)" class="modal-body">
                <input type="hidden" id="targetProfileId">
                
                <div class="section-title">Employment Track Details</div>
                <div class="form-row">
                    <div class="form-group"><label>Company ID Number</label><input type="text" id="empIdNo"></div>
                    <div class="form-group"><label>Date Hired</label><input type="date" id="dateHired"></div>
                </div>

                <div class="section-title">Personal Identity Matrix</div>
                <div class="form-row"> 
                    <div class="form-group"><label>Given Name</label><input type="text" id="givenName"></div>
                    <div class="form-group"><label>Surname</label><input type="text" id="surname"></div>
                </div>
                
                <div class="section-title">Government Documentation Registries</div>
                <div class="form-row">
                    <div class="form-group"><label>SSS Number</label><input type="text" id="sssNo"></div>
                    <div class="form-group"><label>TIN Number</label><input type="text" id="tinNo"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Pag-IBIG MID</label><input type="text" id="pagibigNo"></div>
                    <div class="form-group"><label>PhilHealth</label><input type="text" id="philhealthNo"></div>
                </div>

                <div class="modal-actions">
                    <button type="button" onclick="document.getElementById('dossierModal').style.display='none'">Close</button>
                    <button type="submit" class="btn-save">Save Records</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://ebicabxnzeexucggrmbo.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaWNhYnhuemVleHVjZ2dybWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjM4MjgsImV4cCI6MjA5NzI5OTgyOH0.VJaMTAtCe0CclxlyzMMa0R3J9Pv6hZhPQaQV-RxrFK8");

        async function load201Files() {
            const { data } = await supabaseClient.from('profiles').select('*');
            const container = document.getElementById('recordsContainer');
            container.innerHTML = data.map(p => `
                <div class="record-card">
                    <div><h3>${p.username}</h3><p>${p.id}</p></div>
                    <button onclick="inspectFile('${p.id}', '${p.username}')">Inspect</button>
                </div>
            `).join('');
        }

        async function inspectFile(id, username) {
            document.getElementById('targetProfileId').value = id;
            document.getElementById('modalEmployeeTitle').textContent = `Dossier: ${username}`;
            
            // Clear existing
            const form = document.getElementById('dossierForm');
            form.reset();

            const { data } = await supabaseClient.from('employee_201_docs').select('*').eq('id', id).maybeSingle();
            if (data) {
                document.getElementById('empIdNo').value = data.emp_id_no || '';
                document.getElementById('dateHired').value = data.date_hired || '';
                document.getElementById('givenName').value = data.given_name || '';
                document.getElementById('surname').value = data.surname || '';
                document.getElementById('sssNo').value = data.sss_no || '';
                document.getElementById('tinNo').value = data.tin_no || '';
                document.getElementById('pagibigNo').value = data.pagibig_no || '';
                document.getElementById('philhealthNo').value = data.philhealth_no || '';
            }
            document.getElementById('dossierModal').style.display = 'flex';
        }

        async function saveGovernmentDocs(e) {
            e.preventDefault();
            const payload = {
                id: document.getElementById('targetProfileId').value,
                emp_id_no: document.getElementById('empIdNo').value,
                date_hired: document.getElementById('dateHired').value,
                given_name: document.getElementById('givenName').value,
                surname: document.getElementById('surname').value,
                sss_no: document.getElementById('sssNo').value,
                tin_no: document.getElementById('tinNo').value,
                pagibig_no: document.getElementById('pagibigNo').value,
                philhealth_no: document.getElementById('philhealthNo').value
            };
            await supabaseClient.from('employee_201_docs').upsert(payload);
            alert("Saved.");
            document.getElementById('dossierModal').style.display = 'none';
        }

        function handleLogout() { supabaseClient.auth.signOut(); window.location.href = "login.html"; }
        load201Files();
    </script>
</body>
</html>
